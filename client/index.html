<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Manus Next</title>
    <meta name="description" content="Manus Next — Your autonomous AI agent. Task execution, web research, code generation, document creation, and more. Free and open-source." />
    <meta property="og:title" content="Manus Next — Manus Next Agent" />
    <meta property="og:description" content="Autonomous AI agent for research, coding, analysis, and document generation. Free, open-source, and privacy-first." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Manus Next — Manus Next Agent" />
    <meta name="twitter:description" content="Autonomous AI agent for research, coding, analysis, and document generation." />
    <meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Manus Next" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/manus-storage/apple-touch-icon_bfcf502c.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/manus-storage/icon-192_fb952706.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Manus Next",
      "description": "Autonomous AI agent for research, coding, analysis, and document generation. Free, open-source, and privacy-first.",
      "applicationCategory": "Productivity",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI-powered web research",
        "Parallel wide research",
        "Code execution and generation",
        "Document generation",
        "Image generation",
        "Voice transcription",
        "Cross-session memory",
        "Task sharing and collaboration",
        "Scheduled task automation",
        "Task replay with timeline",
        "Data analysis and visualization",
        "Keyboard shortcuts"
      ]
    }
    </script>
    <script>
      // Apply dark class before first paint to prevent FOUC and contrast checker false positives
      (function() {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        // Default to dark when no preference is stored (matches ThemeProvider defaultTheme="dark")
        if (stored === 'dark' || stored === 'system' && prefersDark || (!stored && true)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
