<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Manus Next</title>
    <meta name="description" content="Manus Next — Your sovereign AI agent. Autonomous task execution, web research, code generation, document creation, and more. Free and open-source." />
    <meta property="og:title" content="Manus Next — Sovereign AI Agent" />
    <meta property="og:description" content="Autonomous AI agent for research, coding, analysis, and document generation. Free, open-source, and privacy-first." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Manus Next — Sovereign AI Agent" />
    <meta name="twitter:description" content="Autonomous AI agent for research, coding, analysis, and document generation." />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Manus Next",
      "description": "Autonomous AI agent for research, coding, analysis, and document generation. Free, open-source, and privacy-first.",
      "applicationCategory": "Productivity",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI-powered web research",
        "Parallel wide research",
        "Code execution and generation",
        "Document generation",
        "Image generation",
        "Voice transcription",
        "Cross-session memory",
        "Task sharing and collaboration",
        "Scheduled task automation",
        "Task replay with timeline",
        "Data analysis and visualization",
        "Keyboard shortcuts"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
