id: orch-3
name: mode-switching
title: Mode Switching Mid-Task
category: orchestration
status: GREEN
task:
  prompt: >-
    Switch seamlessly between different operational modes (chat, agent, browser, code) mid-task based on evolving requirements without losing context.
  expected_behavior: >-
    Seamless mode switching system transitioning between operational modes (chat, agent, browser, code execution) mid-task based on evolving requirements. Context preservation ensures all accumulated knowledge, decisions, and intermediate results carry across mode transitions without information loss. The system detects when the current mode is insufficient for the next step — for example, recognizing that a research question requires browser navigation, or that a coding task needs shell execution. Transition triggers are both automatic (tool requirement analysis) and manual (user requests a specific mode). Each mode maintains its own state (browser tabs, shell sessions, file edits) that persists across switches and can be resumed. The switching mechanism handles cleanup of the current mode's resources before transitioning to prevent resource leaks. Mode-specific optimizations activate appropriate tool sets and prompting strategies for each mode. The system tracks mode switch history for debugging and optimization, identifying patterns where frequent switching indicates task decomposition improvements. Smooth transitions maintain user experience continuity with clear indicators of the active mode and available capabilities.
  scoring_criteria:
    - Seamless transitions between chat, agent, browser, and code execution modes
    - Full context preservation across mode transitions without information loss
    - Automatic mode insufficiency detection triggering appropriate transitions
    - Both automatic and manual transition triggers based on requirements and user requests
    - Per-mode state persistence (browser tabs, shell sessions, files) across switches
    - Resource cleanup before transitions preventing leaks and conflicts
    - Mode-specific optimizations activating appropriate tools and strategies
    - Mode switch history tracking for debugging and task decomposition optimization
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
