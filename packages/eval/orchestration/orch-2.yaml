id: orch-2
name: error-recovery
title: Error Recovery
category: orchestration
status: GREEN
task:
  prompt: >-
    Attempt to access a nonexistent resource, gracefully handle the failure, diagnose the issue, and provide the user
    with alternative approaches.
  expected_behavior: >-
    Agent detects the error from the failed operation, does not crash or enter infinite retry loop, informs the user
    about the failure with clear explanation, diagnoses possible causes, and suggests concrete alternative approaches.
    Demonstrates robust error recovery across tool boundaries.
  scoring_criteria:
    - Error caught without crash or infinite loop
    - User informed with clear, non-technical explanation
    - Root cause diagnosis provided
    - Concrete alternative approaches suggested
    - Agent continues functioning after error recovery
    - No data loss from partial operations before failure
    - Graceful degradation rather than complete failure
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
result: null
