id: orch-1
name: multi-tool-chain
title: Multi-Tool Chain
category: orchestration
task:
  prompt: Research a topic, generate an image about it, create a document summarizing
    findings, and share the task.
  expected_behavior: Agent chains web_search → generate_image → generate_document
    → share in sequence.
  scoring_criteria:
  - All 4 tools used
  - Correct sequence
  - Output coherent
  - Share link generated
scoring:
  dimensions:
  - correctness
  - completeness
  - efficiency
  - robustness
  - user_experience
  - maintainability
  - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
result: null
