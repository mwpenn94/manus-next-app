id: orch-1
name: multi-tool-chain
title: Multi-Tool Chain
category: orchestration
status: GREEN
task:
  prompt: >-
    Execute complex tasks requiring sequential invocation of multiple tools with data passing between steps, error handling at each stage, and progress tracking.
  expected_behavior: >-
    Multi-tool orchestration system executing complex tasks through sequential tool chains with intelligent data passing between steps. The orchestrator analyzes task requirements to determine the optimal tool sequence, selecting from browser, shell, file operations, search, and generation tools. Data flows between tools via structured intermediate results — for example, search results feed into browser navigation, which produces data for file writing, which triggers shell execution. Error handling at each stage detects failures, attempts automatic recovery, and falls back to alternative approaches when primary tools fail. Progress tracking provides real-time visibility into the current step, completed steps, and estimated remaining work. The system handles tool dependencies by ensuring prerequisite tools complete successfully before dependent tools begin. Parallel execution opportunities are identified and exploited when tools have no data dependencies. The orchestrator maintains a task plan that adapts dynamically as intermediate results reveal new requirements or constraints. Rollback capabilities undo partial progress when a critical step fails, preventing inconsistent state.
  scoring_criteria:
    - Optimal tool sequence selection from browser, shell, file, search, and generation tools
    - Structured data passing between tools via intermediate results
    - Per-stage error handling with automatic recovery and alternative fallback approaches
    - Real-time progress tracking with current step, completed steps, and time estimates
    - Tool dependency management ensuring prerequisites complete before dependents
    - Parallel execution when tools have no data dependencies for efficiency
    - Dynamic task plan adaptation as intermediate results reveal new requirements
    - Rollback of partial progress on critical step failure preventing inconsistent state
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
