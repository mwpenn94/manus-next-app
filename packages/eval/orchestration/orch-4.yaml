id: orch-4
name: memory-across-tasks
title: Memory Across Tasks
category: orchestration
status: GREEN
task:
  prompt: >-
    Store user preferences and project context in one task session, then retrieve and apply that context in a subsequent
    interaction to demonstrate cross-session memory.
  expected_behavior: >-
    Agent stores user preferences, project context, and key decisions in persistent memory (database, project files, or
    memory system). In a subsequent interaction, agent retrieves this stored context and applies it to new work without
    the user needing to repeat information. Demonstrates continuity across task boundaries.
  scoring_criteria:
    - User context stored persistently (database or project files)
    - Context retrievable in subsequent sessions
    - Stored information correctly applied to new tasks
    - No information loss between sessions
    - Project-level instructions maintained across tasks
    - User preferences respected without re-specification
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
result: null
