id: 17
name: scheduled-tasks
title: Scheduled Tasks
category: features
status: GREEN
task:
  prompt: >-
    Schedule tasks for future execution at specific times or recurring intervals with cron expressions, timezone support, and a schedule management dashboard.
  expected_behavior: >-
    Comprehensive task scheduling system supporting both one-time and recurring task execution. Cron expressions use 6-field format (seconds through day-of-week) for precise timing control with timezone-aware execution based on user preferences. Interval-based scheduling supports fixed-interval recurring tasks with minimum 5-minute intervals. The schedule management dashboard displays all active schedules with next-execution previews, execution history, and success/failure indicators. Each scheduled task includes a natural language prompt describing the work to perform at execution time. Schedule modification allows updating timing, prompt, and repeat settings without recreating the schedule. Execution history tracks each run with timestamps, duration, and outcome with one-click access to task results. The system handles missed executions (during sandbox hibernation) with configurable catch-up policies. Expiration dates allow automatic schedule deactivation after a specified datetime.
  scoring_criteria:
    - 6-field cron expression support with timezone-aware execution
    - Interval-based recurring scheduling with configurable minimum intervals
    - Schedule management dashboard with next-execution previews and history
    - Natural language prompt describing work to perform at execution time
    - Schedule modification without recreation (timing, prompt, repeat settings)
    - Execution history with timestamps, duration, outcomes, and task result links
    - Missed execution handling with configurable catch-up policies
    - Automatic schedule deactivation via expiration datetime configuration
