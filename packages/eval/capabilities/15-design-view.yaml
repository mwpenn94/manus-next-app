id: 15
name: design-view
title: Design View
category: webapp
status: GREEN
task:
  prompt: >-
    Use the Design View visual editor to directly manipulate a web application's UI elements, adjusting colors, spacing, typography, borders, and layout through both point-and-click controls and natural language instructions, with real-time code synchronization and checkpoint-based rollback.
  expected_behavior: >-
    Design View opens as an interactive visual editor panel in the Management UI, overlaying the live preview of the deployed web application. Users can select any rendered DOM element to inspect and adjust its CSS properties (colors, borders, padding, margins, fonts, shadows, border-radius) via intuitive point-and-click controls. Natural language descriptions are processed by AI to generate corresponding CSS and component changes. All visual edits are synchronized in real-time to the source code files, maintaining consistency between the visual representation and the codebase. Every design change creates a new checkpoint that can be rolled back via the version history. The editor supports responsive breakpoint switching to preview and edit layouts at different viewport widths. Changes respect the existing Tailwind CSS utility class system and shadcn/ui component patterns.
  scoring_criteria:
    - Visual editor overlay on live preview with interactive element selection
    - Point-and-click CSS property adjustment (colors, spacing, borders, fonts, shadows)
    - Natural language design change descriptions processed by AI into code changes
    - Real-time bidirectional synchronization between visual edits and source code
    - Checkpoint creation for every design change with version history rollback
    - Responsive breakpoint switching for multi-viewport layout editing
    - Tailwind CSS utility class preservation in generated code changes
    - shadcn/ui component pattern respect in AI-generated modifications
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
result: null
