id: 22
name: cloud-browser
title: Cloud Browser
category: agent-core
status: GREEN
task:
  prompt: >-
    Launch a cloud-hosted Chromium browser, navigate to a complex JavaScript-rendered web application, authenticate through an OAuth flow, extract structured data from dynamically-loaded content, capture verification screenshots, and manage file downloads — all with persistent session state across tasks.
  expected_behavior: >-
    Agent launches a persistent cloud-hosted Chromium stable browser session with full JavaScript execution, cookie persistence, and login state management that survives across tasks and sandbox hibernation cycles. Navigates to target URLs using the browser tool with explicit intent classification (navigational for general browsing, informational for reading content, transactional for form submission). Handles complex OAuth authentication flows including multi-step redirects, session cookie management, and CSRF token handling. Extracts structured content from JavaScript-rendered single-page applications by waiting for dynamic content loading and DOM stabilization. Captures screenshots for visual verification of page state during debugging. Manages file downloads to /home/ubuntu/Downloads/ directory. Supports multi-step transactional workflows including form filling, button clicking, dropdown selection, and data submission with confirmation.
  scoring_criteria:
    - Cloud Chromium stable browser launch with persistent session state across tasks
    - URL navigation with explicit intent classification (navigational, informational, transactional)
    - Complex OAuth authentication flow handling with multi-step redirects and cookie management
    - Dynamic content extraction from JavaScript-rendered SPAs with DOM stabilization waiting
    - Screenshot capture and visual verification of page state for debugging workflows
    - File download management to designated /home/ubuntu/Downloads/ directory
    - Multi-step transactional workflows (form filling, button clicking, data submission)
    - Cross-task session persistence surviving sandbox hibernation and restart cycles
scoring:
  dimensions:
