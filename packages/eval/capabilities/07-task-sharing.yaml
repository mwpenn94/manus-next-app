id: 7
name: task-sharing
title: Task Sharing via Signed URL
category: agent-core
status: GREEN
task:
  prompt: >-
    Share completed task results via cryptographically signed URLs with configurable access controls, expiration policies, and an intuitive sharing interface.
  expected_behavior: >-
    Secure task sharing system generating cryptographically signed URLs that provide read-only access to completed task results. Shared links include configurable expiration policies (1 hour to permanent) with automatic link invalidation after expiry. The sharing interface provides one-click URL generation with copy-to-clipboard and QR code options. Access controls support public links (anyone with URL), authenticated links (requires Manus login), and restricted links (specific user allowlist). Shared task views render the complete task timeline including agent actions, outputs, and artifacts in a polished read-only format. Link analytics track view counts, unique visitors, and geographic distribution. Revocation allows the task owner to immediately invalidate any shared link. The system handles expired or revoked links gracefully with informative error pages and contact-owner options.
  scoring_criteria:
    - Cryptographically signed URLs with configurable expiration (1 hour to permanent)
    - One-click sharing interface with copy-to-clipboard and QR code generation
    - Access control levels: public, authenticated, and restricted user allowlist
    - Polished read-only task timeline rendering with actions, outputs, and artifacts
    - Link analytics tracking view counts, unique visitors, and geographic distribution
    - Immediate link revocation capability for task owners
    - Automatic link invalidation after expiry with graceful error pages
    - Informative expired/revoked link pages with contact-owner options
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
