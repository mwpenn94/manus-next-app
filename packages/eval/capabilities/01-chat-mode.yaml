id: 1
name: chat-mode
title: Chat Mode
category: agent-core
status: GREEN
task:
  prompt: >-
    Engage in natural multi-turn conversation with context retention, streaming responses, markdown rendering, and adaptive tone matching for diverse user needs.
  expected_behavior: >-
    Full-featured conversational interface supporting multi-turn dialogue with deep context retention across conversation turns. Responses stream in real-time with visible typing indicators for responsive user experience. Markdown content renders with proper formatting including code blocks with syntax highlighting, tables, lists, and inline formatting via Streamdown component. The agent adapts tone and detail level based on conversation context — concise for simple queries, thorough for complex analysis. Conversation history is maintained within sessions with efficient context windowing to prevent token overflow. Error states display gracefully with retry options and clear error descriptions. The interface supports keyboard shortcuts for common actions and maintains scroll position during streaming. Input supports multi-line text with auto-resize and file attachment capabilities.
  scoring_criteria:
    - Multi-turn conversation with deep context retention across dialogue turns
    - Real-time response streaming with visible typing indicators via Streamdown
    - Markdown rendering with syntax-highlighted code blocks, tables, and formatting
    - Adaptive tone matching based on query complexity and conversation context
    - Efficient context windowing preventing token overflow in long conversations
    - Graceful error states with retry options and clear error descriptions
    - Keyboard shortcuts for common actions with maintained scroll position
    - Multi-line input with auto-resize and file attachment capabilities
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
result: null
