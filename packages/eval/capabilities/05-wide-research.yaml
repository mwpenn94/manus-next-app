id: 5
name: wide-research
title: Wide Research
category: agent-core
status: GREEN
task:
  prompt: Conduct wide research on the competitive landscape of AI agent platforms, synthesizing findings from 15+ sources
    into a structured report with citations, comparisons, and strategic recommendations.
  expected_behavior: Agent spawns parallel research subtasks across multiple search engines and databases. Results are deduplicated,
    cross-referenced, and synthesized into a comprehensive markdown report with inline citations, comparison tables, and confidence
    scores. Multi-source research using search tool (info, news, research, data types), parallel subtask spawning via map
    tool for broad coverage, browser-based deep reading of source URLs, and synthesis into structured reports with citations.
  scoring_criteria:
  - Parallel subtask spawning with 5+ concurrent research threads
  - Cross-source deduplication and fact verification across 15+ sources
  - Structured markdown output with inline citations and bibliography
  - Comparison tables synthesizing findings across multiple dimensions
  - Executive summary with key takeaways and strategic recommendations
  - Confidence scoring for claims based on source agreement
  - Coverage of diverse source types (academic, industry, news, technical)
scoring:
  dimensions:
  - correctness
  - completeness
  - efficiency
  - robustness
  - user_experience
  - maintainability
  - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
result: null
