id: 23
name: browser-operator
title: Browser Operator
category: browser-computer
status: GREEN
task:
  prompt: >-
    Operate a full Chromium browser for web navigation, form filling, data extraction, authentication, and multi-tab workflows with screenshot verification.
  expected_behavior: >-
    Full-featured browser automation operating Chromium stable with persistent login state and cookie management across tasks. Navigation supports URL-based browsing with intent classification (navigational, informational, transactional) for optimized page handling. Form filling automates text input, dropdown selection, checkbox toggling, and file upload with intelligent field detection. Data extraction captures structured content from web pages with CSS selector and XPath targeting for precise element identification. Multi-tab workflows manage concurrent browser sessions for comparison shopping, research aggregation, and parallel data collection. Screenshot capture verifies visual state after each significant action, enabling visual debugging and progress documentation. Authentication handling maintains login sessions across sandbox hibernation cycles for continuous access to authenticated services. The browser handles dynamic content (SPAs, infinite scroll, lazy loading) with configurable wait conditions and scroll-to-load automation. Error recovery detects navigation failures, timeout conditions, and CAPTCHA challenges with automatic retry and user escalation.
  scoring_criteria:
    - Full Chromium browser with persistent login state and cookie management
    - Intent-classified navigation (navigational, informational, transactional)
    - Intelligent form filling with text, dropdowns, checkboxes, and file uploads
    - Structured data extraction via CSS selectors and XPath targeting
    - Multi-tab concurrent workflows for comparison and parallel data collection
    - Screenshot verification after significant actions for visual debugging
    - Dynamic content handling (SPAs, infinite scroll) with configurable wait conditions
    - Error recovery for navigation failures, timeouts, and CAPTCHA with user escalation
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
