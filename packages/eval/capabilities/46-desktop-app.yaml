id: 46
name: desktop-app
title: Desktop App
category: desktop
status: GREEN
task:
  prompt: >-
    Build cross-platform desktop applications using Electron or Tauri with native OS integration, auto-updates, and platform-specific packaging.
  expected_behavior: >-
    Cross-platform desktop application development using Electron or Tauri frameworks with native OS integration. The build pipeline generates platform-specific installers (DMG for macOS, MSI/NSIS for Windows, AppImage/deb for Linux) from a single codebase. Native OS integration includes system tray icons, native menus, file associations, and notification center integration. Auto-update functionality checks for new versions on startup with background download and one-click install. The application shell provides a responsive window with minimum size constraints, fullscreen support, and proper DPI scaling for high-resolution displays. IPC communication between main and renderer processes follows secure patterns with context isolation and preload scripts. Local data persistence uses SQLite or the system keychain for sensitive credentials. The development workflow includes hot reload for rapid iteration and debugging tools with Chrome DevTools integration. Code signing configuration ensures the application passes OS security checks (Gatekeeper on macOS, SmartScreen on Windows).
  scoring_criteria:
    - Platform-specific installer generation (DMG, MSI/NSIS, AppImage/deb) from single codebase
    - Native OS integration (system tray, menus, file associations, notifications)
    - Auto-update with background download and one-click install
    - Responsive window with DPI scaling and fullscreen support
    - Secure IPC with context isolation and preload scripts
    - Local data persistence via SQLite and system keychain for credentials
    - Hot reload development workflow with Chrome DevTools debugging
    - Code signing for OS security checks (Gatekeeper, SmartScreen)
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
