id: 66
name: maps-in-apps
title: Maps in Generated Apps
category: website-builder-features
status: GREEN
task:
  prompt: >-
    Integrate Google Maps into generated web applications with interactive maps, geocoding, directions, places search, and drawing tools via proxy authentication.
  expected_behavior: >-
    Full Google Maps integration in generated web applications using the MapView component from client/src/components/Map.tsx with proxy-authenticated access requiring no API keys from users. The MapView component provides an interactive map with onMapReady callback for initializing any Google Maps service. Places API enables location search with autocomplete suggestions and detailed place information. Geocoding converts between addresses and coordinates with reverse geocoding support. Directions API calculates routes between points with multiple transport modes (driving, walking, transit, cycling) and turn-by-turn instructions. Drawing tools allow users to create markers, polygons, polylines, and circles on the map with event handlers for user interactions. Heatmap visualization displays density data with configurable gradient colors and radius. Street View integration provides immersive 360-degree imagery at any supported location. The proxy handles all authentication automatically, providing full access to all Google Maps JavaScript API features without feature limitations.
  scoring_criteria:
    - MapView component with proxy-authenticated access requiring no user API keys
    - Places API with autocomplete suggestions and detailed place information
    - Geocoding and reverse geocoding between addresses and coordinates
    - Directions API with multiple transport modes and turn-by-turn instructions
    - Drawing tools for markers, polygons, polylines, and circles with event handlers
    - Heatmap visualization with configurable gradient colors and radius
    - Street View integration with 360-degree imagery at supported locations
    - Full Google Maps JavaScript API access with no feature limitations via proxy
