id: 16
name: manus-slides
title: Manus Slides
category: content-creation
status: GREEN
task:
  prompt: >-
    Generate professional slide presentations with two rendering modes (HTML for data-heavy content, image for visual impact), Chart.js integration, and export to PDF/PPT.
  expected_behavior: >-
    Professional slide presentation generation system with two distinct rendering modes optimized for different use cases. HTML mode generates editable slides using HTML/CSS with Chart.js integration for data-heavy presentations featuring interactive charts, tables, and code blocks. Image mode renders each slide as a single high-quality image for visually stunning presentations with artistic layouts and custom typography. The generation workflow requires content preparation in a markdown file before entering slides mode, ensuring structured content drives the presentation. Chart.js integration supports bar, line, pie, doughnut, radar, and scatter charts with customizable colors, labels, and animations. Slide count scales with content complexity from simple 5-slide overviews to detailed 30+ slide presentations. Export via manus-export-slides produces PDF and PPT formats for distribution and editing. The system follows the slides_content_writing -> slides_generation phase separation for optimal content organization. Template themes provide consistent visual identity with customizable color schemes and font selections.
  scoring_criteria:
    - Dual rendering modes: HTML (editable, data-heavy) and image (visual impact)
    - Chart.js integration with bar, line, pie, radar, scatter charts and animations
    - Content-first workflow with markdown preparation before slide generation
    - Scalable slide count from 5-slide overviews to 30+ detailed presentations
    - PDF and PPT export via manus-export-slides for distribution and editing
    - Phase-separated content writing and slide generation for optimal organization
    - Template themes with customizable color schemes and font selections
    - Interactive data visualization with tables, code blocks, and chart customization
scoring:
