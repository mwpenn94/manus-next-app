id: 57
name: team-billing
title: Team Billing + Admin
category: collaboration
status: GREEN
task:
  prompt: >-
    Manage team subscriptions with seat-based billing, admin controls, usage tracking, and Stripe-powered payment processing with invoice management.
  expected_behavior: >-
    Team billing and administration system with seat-based subscription management powered by Stripe. Admin controls provide a dashboard for managing team members with invite, remove, and role assignment capabilities. Seat-based billing automatically adjusts subscription charges when team members are added or removed with prorated billing for mid-cycle changes. Usage tracking monitors per-member resource consumption (tasks, API calls, storage) with configurable limits and overage policies. Invoice management generates and delivers monthly invoices with line-item detail for each team member and usage category. Payment method management allows admins to update credit cards, view payment history, and download receipts. The billing dashboard displays current plan details, upcoming charges, and usage trends with visual charts. Subscription plan management supports upgrades, downgrades, and cancellations with immediate or end-of-period effective dates. Tax handling calculates applicable taxes based on team location with proper tax ID validation and exemption support.
  scoring_criteria:
    - Admin dashboard for team member management (invite, remove, role assignment)
    - Seat-based billing with automatic charge adjustment and prorated mid-cycle changes
    - Per-member usage tracking (tasks, API calls, storage) with configurable limits
    - Monthly invoice generation with line-item detail per member and usage category
    - Payment method management with card updates, history, and receipt downloads
    - Billing dashboard with plan details, upcoming charges, and usage trend charts
    - Subscription plan upgrades, downgrades, and cancellations with effective date options
    - Tax calculation based on location with tax ID validation and exemption support
scoring:
  dimensions:
    - correctness
    - completeness
    - efficiency
    - robustness
    - user_experience
    - maintainability
    - innovation
  weights:
    correctness: 0.2
    completeness: 0.15
    efficiency: 0.1
    robustness: 0.15
    user_experience: 0.15
    maintainability: 0.1
    innovation: 0.15
  threshold: 0.8
